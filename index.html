<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>3D Interlace Pro</title>
    <style>
        :root { --accent: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        header { text-align: center; margin-bottom: 20px; }
        h2 { margin: 0; font-size: 22px; background: linear-gradient(135deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        #preview-outer { width: 100%; background: #000; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; min-height: 250px; position: relative; }
        canvas { max-width: 100%; height: auto; display: block; }
        
        /* 加载状态动画 */
        #loader { position: absolute; display: none; background: rgba(0,0,0,0.7); color: white; padding: 10px 20px; border-radius: 20px; font-size: 12px; }

        .controls { margin-top: 20px; background: var(--card); padding: 20px; border-radius: 20px; display: grid; gap: 18px; }
        .upload-btn { background: var(--accent); color: white; padding: 15px; border-radius: 12px; text-align: center; font-weight: 700; cursor: pointer; }
        input[type="file"] { display: none; }
        
        .control-item { display: flex; flex-direction: column; gap: 8px; }
        .label-row { display: flex; justify-content: space-between; font-size: 13px; color: #94a3b8; }
        input[type="range"] { width: 100%; accent-color: var(--accent); }
        
        .filter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .filter-opt { padding: 10px 5px; border: 1px solid #334155; border-radius: 10px; text-align: center; font-size: 12px; background: #0f172a; }
        .filter-opt.active { background: var(--accent); color: white; border-color: var(--accent); }

        .save-btn { background: #10b981; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 700; font-size: 16px; width: 100%; }
        .hint { font-size: 11px; color: #64748b; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>3D INTERLACE PRO</h2>
    </header>

    <div id="preview-outer">
        <canvas id="mainCanvas"></canvas>
        <div id="loader">处理中...</div>
    </div>

    <div class="controls">
        <label class="upload-btn">上传 2-3 张照片<input type="file" id="fileInput" accept="image/*" multiple></label>

        <div class="control-item">
            <div class="label-row"><span>切片密度</span><span id="stripVal">24</span></div>
            <input type="range" id="stripRange" min="8" max="60" value="24">
        </div>

        <div class="control-item">
            <label style="font-size:13px; color:#94a3b8">视觉风格</label>
            <div class="filter-grid" id="filterGrid">
                <div class="filter-opt active" data-filter="none">原图</div>
                <div class="filter-opt" data-filter="bw">黑白</div>
                <div class="filter-opt" data-filter="sepia">复古</div>
            </div>
        </div>

        <button class="save-btn" id="saveBtn">保存到相册 / 分享</button>
        <p class="hint">提示：若无法直接保存，可长按图片手动存储</p>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const fileInput = document.getElementById('fileInput');
    const stripRange = document.getElementById('stripRange');
    const stripVal = document.getElementById('stripVal');
    const filterOpts = document.querySelectorAll('.filter-opt');
    const saveBtn = document.getElementById('saveBtn');
    const loader = document.getElementById('loader');

    let images = [];
    let currentFilter = 'none';

    fileInput.onchange = async (e) => {
        const files = Array.from(e.target.files).slice(0, 3);
        if (files.length < 2) return alert("请选择至少2张图");
        
        images = await Promise.all(files.map(file => {
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.src = URL.createObjectURL(file);
            });
        }));
        
        // 限制最大尺寸以防手机端崩溃
        const maxW = 1200;
        const scale = images[0].width > maxW ? maxW / images[0].width : 1;
        canvas.width = images[0].width * scale;
        canvas.height = images[0].height * scale;
        
        render();
    };

    // 手动像素处理滤镜（解决手机端兼容性问题）
    function applyManualFilter() {
        if (currentFilter === 'none') return;
        
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;

        for (let i = 0; i < data.length; i += 4) {
            const r = data[i], g = data[i+1], b = data[i+2];
            if (currentFilter === 'bw') {
                const avg = 0.3 * r + 0.59 * g + 0.11 * b;
                data[i] = data[i+1] = data[i+2] = avg;
            } else if (currentFilter === 'sepia') {
                data[i] = (r * 0.393) + (g * 0.769) + (b * 0.189);
                data[i+1] = (r * 0.349) + (g * 0.686) + (b * 0.168);
                data[i+2] = (r * 0.272) + (g * 0.534) + (b * 0.131);
            }
        }
        ctx.putImageData(imgData, 0, 0);
    }

    async function render() {
        if (images.length < 2) return;
        loader.style.display = 'block';

        const numStrips = parseInt(stripRange.value);
        stripVal.innerText = numStrips;
        const stripW = canvas.width / numStrips;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. 绘制切片
        for (let i = 0; i < numStrips; i++) {
            const img = images[i % images.length];
            const sW = img.width / numStrips;
            ctx.drawImage(img, i * sW, 0, sW, img.height, i * stripW, 0, stripW, canvas.height);
        }

        // 2. 应用滤镜（像素级处理）
        applyManualFilter();

        // 3. 绘制3D光影
        for (let i = 0; i < numStrips; i++) {
            const x = i * stripW;
            // 高光
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(x, 0, Math.max(1, stripW * 0.05), canvas.height);
            // 渐变阴影
            const grad = ctx.createLinearGradient(x + stripW*0.5, 0, x + stripW, 0);
            grad.addColorStop(0, 'rgba(0,0,0,0)');
            grad.addColorStop(1, 'rgba(0,0,0,0.3)');
            ctx.fillStyle = grad;
            ctx.fillRect(x + stripW*0.5, 0, stripW*0.5, canvas.height);
        }
        
        loader.style.display = 'none';
    }

    stripRange.oninput = render;
    filterOpts.forEach(opt => {
        opt.onclick = () => {
            filterOpts.forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            currentFilter = opt.dataset.filter;
            render();
        };
    });

    // 解决保存问题：优先使用 Web Share API 呼起原生菜单
    saveBtn.onclick = async () => {
        if (images.length < 2) return;
        
        canvas.toBlob(async (blob) => {
            const file = new File([blob], 'my-collage.png', { type: 'image/png' });
            
            // 如果支持原生分享 (iOS Safari/Android Chrome 基本都支持)
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: '我的拼贴作品',
                    });
                } catch (err) {
                    // 用户取消分享
                }
            } else {
                // 降级方案：在新窗口打开图片让用户长按
                const dataURL = canvas.toDataURL('image/png');
                const win = window.open();
                win.document.write(`<img src="${dataURL}" style="width:100%" />`);
                alert("请长按图片保存到相册");
            }
        });
    };
</script>
</body>
</html>
