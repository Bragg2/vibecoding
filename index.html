<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>3D Interlace Studio</title>
    <style>
        :root { 
            --accent: #6366f1; 
            --bg: #0f172a; 
            --card: #1e293b;
            --text: #f1f5f9;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        
        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        
        header { text-align: center; margin-bottom: 20px; }
        h2 { margin: 0; font-size: 24px; background: linear-gradient(135deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { margin: 5px 0 0; font-size: 12px; color: #94a3b8; letter-spacing: 1px; }

        /* 画布容器：自适应高度 */
        #preview-outer {
            width: 100%;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px;
        }

        canvas { 
            max-width: 100%; 
            height: auto; 
            display: block; 
            transition: filter 0.3s ease; /* 手机端预览滤镜平滑过渡 */
        }

        .controls { 
            margin-top: 20px; 
            background: var(--card); 
            padding: 20px; 
            border-radius: 20px; 
            display: grid; 
            gap: 20px; 
        }

        .upload-btn {
            background: var(--accent); 
            color: white; 
            padding: 15px; 
            border-radius: 12px;
            text-align: center; 
            font-weight: 700; 
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }
        input[type="file"] { display: none; }
        
        .control-item { display: flex; flex-direction: column; gap: 10px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; }
        label { font-size: 14px; font-weight: 600; color: #94a3b8; }
        .val-badge { font-size: 12px; background: #334155; padding: 2px 8px; border-radius: 10px; color: var(--accent); }

        input[type="range"] { 
            width: 100%; 
            height: 6px;
            background: #334155;
            border-radius: 5px;
            outline: none;
            accent-color: var(--accent);
        }
        
        /* 滤镜按钮组 */
        .filter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .filter-opt { 
            padding: 10px 5px; 
            border: 1px solid #334155; 
            border-radius: 10px; 
            text-align: center; 
            font-size: 12px; 
            cursor: pointer; 
            background: #0f172a;
            transition: all 0.2s;
        }
        .filter-opt.active { 
            background: var(--accent); 
            color: white; 
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        .save-btn {
            background: #10b981; 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 12px;
            font-weight: 700; 
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
        }

        /* 移动端点击态 */
        .upload-btn:active, .save-btn:active, .filter-opt:active { transform: scale(0.96); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>3D INTERLACE</h2>
        <p>立体交错拼贴实验</p>
    </header>

    <div id="preview-outer">
        <canvas id="mainCanvas"></canvas>
    </div>

    <div class="controls">
        <label class="upload-btn">
            选择 2-3 张照片
            <input type="file" id="fileInput" accept="image/*" multiple>
        </label>

        <div class="control-item">
            <div class="label-row">
                <label>切片密度</label>
                <span class="val-badge" id="stripVal">24</span>
            </div>
            <input type="range" id="stripRange" min="6" max="60" value="24">
        </div>

        <div class="control-item">
            <label>视觉风格</label>
            <div class="filter-grid" id="filterGrid">
                <div class="filter-opt active" data-filter="none">原色</div>
                <div class="filter-opt" data-filter="grayscale(100%) contrast(1.1)">黑白</div>
                <div class="filter-opt" data-filter="sepia(0.5) contrast(1.2) brightness(0.9)">复古</div>
                <div class="filter-opt" data-filter="saturate(1.8)">鲜艳</div>
                <div class="filter-opt" data-filter="contrast(1.4) hue-rotate(45deg)">异幻</div>
                <div class="filter-opt" data-filter="blur(1px) contrast(1.2)">柔焦</div>
            </div>
        </div>

        <button class="save-btn" id="saveBtn">保存拼贴作品</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const fileInput = document.getElementById('fileInput');
    const stripRange = document.getElementById('stripRange');
    const stripVal = document.getElementById('stripVal');
    const filterOpts = document.querySelectorAll('.filter-opt');
    const saveBtn = document.getElementById('saveBtn');

    let images = [];
    let currentFilter = 'none';

    // 1. 处理上传与尺寸自适应
    fileInput.onchange = async (e) => {
        const files = Array.from(e.target.files).slice(0, 3);
        if (files.length < 2) return alert("请至少选择2张图片");

        images = await Promise.all(files.map(file => {
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.src = URL.createObjectURL(file);
            });
        }));

        // 自适应尺寸：以第一张图为准，但限制最大宽度防止手机端Canvas过大崩溃
        const maxRes = 1500; 
        let scale = 1;
        if (images[0].width > maxRes) scale = maxRes / images[0].width;
        
        canvas.width = images[0].width * scale;
        canvas.height = images[0].height * scale;
        
        render();
    };

    // 2. 核心渲染函数
    function render() {
        if (images.length < 2) return;

        const numStrips = parseInt(stripRange.value);
        stripVal.innerText = numStrips;
        const stripWidth = canvas.width / numStrips;

        // 清除画布
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // --- 第一步：绘制交错图片 (开启滤镜) ---
        ctx.save();
        // 兼容性处理：同时设置 Canvas 内部滤镜和外部样式
        ctx.filter = currentFilter; 
        canvas.style.filter = currentFilter; 

        for (let i = 0; i < numStrips; i++) {
            const img = images[i % images.length];
            
            // 计算源图的裁剪宽度 (等比例计算)
            const sStripWidth = img.width / numStrips;
            
            ctx.drawImage(
                img, 
                i * sStripWidth, 0, sStripWidth, img.height,
                i * stripWidth, 0, stripWidth, canvas.height
            );
        }
        ctx.restore();

        // --- 第二步：绘制3D光影 (关闭滤镜) ---
        // 必须显式重置，否则光影会被滤镜污染
        ctx.filter = 'none'; 

        for (let i = 0; i < numStrips; i++) {
            const x = i * stripWidth;

            // 1. 左侧高光 (模拟边缘受光)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.fillRect(x, 0, Math.max(1, stripWidth * 0.06), canvas.height);

            // 2. 右侧渐变阴影 (核心：形成凸起感)
            const shadowWidth = stripWidth * 0.6;
            const grad = ctx.createLinearGradient(x + stripWidth - shadowWidth, 0, x + stripWidth, 0);
            grad.addColorStop(0, 'rgba(0,0,0,0)');
            grad.addColorStop(1, 'rgba(0,0,0,0.35)');
            
            ctx.fillStyle = grad;
            ctx.fillRect(x + stripWidth - shadowWidth, 0, shadowWidth, canvas.height);
        }
    }

    // 3. 交互事件
    stripRange.oninput = render;

    filterOpts.forEach(opt => {
        opt.onclick = () => {
            filterOpts.forEach(el => el.classList.remove('active'));
            opt.classList.add('active');
            currentFilter = opt.dataset.filter;
            render();
        };
    });

    saveBtn.onclick = () => {
        if (images.length < 2) return;
        const dataURL = canvas.toDataURL('image/png', 0.9);
        const link = document.createElement('a');
        link.download = `interlace-art-${Date.now()}.png`;
        link.href = dataURL;
        link.click();
    };

    // 初始状态
    ctx.fillStyle = "#1e293b";
    ctx.font = "14px Arial";
    ctx.textAlign = "center";
    ctx.fillText("等待照片上传...", canvas.width/2 || 150, canvas.height/2 || 75);
</script>

</body>
</html>
