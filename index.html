<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Tool Collection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
    body { background: #0e100f; color: white; padding: 60px 32px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .container { width: 100%; max-width: 1200px; }
    .hero { margin-bottom: 48px; }
    .hero h1 { font-size: clamp(2.6rem, 5.5vw, 4rem); font-weight: 700; line-height: 1.05; margin-bottom: 20px; }
    .hero h1 span { color: rgba(255,255,255,0.28); font-weight: 300; }
    .hero p { color: rgba(255,255,255,0.38); font-size: 15px; }
    .grid { display: flex; gap: 20px; width: 100%; max-width: 1200px; }
    .card { background: #141714; border-radius: 12px; overflow: hidden; flex: 1; transition: 0.3s; }
    .card:hover { transform: translateY(-10px); box-shadow: 0 24px 48px rgba(0,0,0,0.6); }
    .card img { width: 100%; height: 220px; object-fit: cover; }
    .card-body { padding: 16px 20px 20px; }
    .tags { display: flex; gap: 6px; margin-bottom: 12px; }
    .tag { padding: 2px 8px; border-radius: 4px; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4); font-size: 11px; }
    .card-title { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
    .card-desc { color: rgba(255,255,255,0.38); font-size: 13px; line-height: 1.6; margin-bottom: 16px; }
    .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 16px 0; }
    a { text-decoration: none; color: inherit; }
  </style>
</head>

<body>
  <div class="container">
    <div class="hero">
      <h1>Design Tool Collection<br><span>UntitledProject</span></h1>
      <p>三个以图像为媒介的视觉创作实验工具，探索拼贴、解构与重组的无限可能。</p>
    </div>
  </div>

  <div class="grid">
    <a class="card" href="/simple-photo-collage/">
      <!-- 本地图片 -->
      <img src="/images/collage.jpg">
      <div class="card-body">
        <div class="tags"><span class="tag">Collage</span></div>
        <div class="card-title">Simple Collage</div>
        <div class="card-desc">图片编织、切割、重组</div>
      </div>
    </a>

    <a class="card" href="/stamp-klon/">
      <!-- 本地图片 -->
      <img src="/images/stamp.jpg">
      <div class="card-body">
        <div class="tags"><span class="tag">Stamp</span></div>
        <div class="card-title">Stamp Klon</div>
        <div class="card-desc">解构、克隆、拼贴</div>
      </div>
    </a>

    <a class="card" href="/crossword-style/">
      <!-- 本地图片 -->
      <img src="/images/crossword.jpg">
      <div class="card-body">
        <div class="tags"><span class="tag">Grid</span></div>
        <div class="card-title">Crossword</div>
        <div class="card-desc">网格重组、视觉实验</div>
      </div>
    </a>
  </div>
</body>
</html>
