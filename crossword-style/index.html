
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>填字游戏照片设计工具</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;700;800&family=Caveat:wght@500;700&display=swap');

:root{
  --bg:#f6f1e7;
  --panel:#fbf8f2;
  --panel-2:#fffdfa;
  --line:#ded5c6;
  --line-strong:#beb4a3;
  --text:#252525;
  --muted:#7d786f;
  --soft:#aba393;
  --accent:#77a142;
  --accent-deep:#638736;
  --accent-soft:#edf4e3;
  --canvas-bg:#f1e8d8;
}

*{box-sizing:border-box;margin:0;padding:0;}

html,body{
  width:100%;
  height:100%;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Manrope','Noto Sans SC',sans-serif;
  font-size:14px;
  overflow:hidden;
}

button,input,select{
  font:inherit;
}

.app-shell{
  display:flex;
  flex-direction:column;
  width:100%;
  height:100%;
}

.topbar{
  height:58px;
  border-bottom:1px solid var(--line);
  background:rgba(255,253,248,0.92);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  flex-shrink:0;
}

.brand{
  font-size:16px;
  font-weight:800;
  letter-spacing:-0.02em;
}

.topbar-actions{
  display:flex;
  gap:10px;
  align-items:center;
}

.btn{
  border:1px solid var(--line);
  background:#fffdfa;
  color:var(--text);
  border-radius:999px;
  padding:10px 18px;
  cursor:pointer;
  transition:border-color .15s ease, background-color .15s ease, color .15s ease;
}
.btn:hover{border-color:var(--line-strong);}
.btn.solid{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
}
.btn.solid:hover{
  background:var(--accent-deep);
  border-color:var(--accent-deep);
}
.btn.sm{
  padding:8px 14px;
  font-size:13px;
}
.btn:disabled{
  opacity:.45;
  cursor:not-allowed;
}

.workspace{
  flex:1;
  min-height:0;
  display:flex;
}

.control-shell{
  width:308px;
  min-width:308px;
  border-right:1px solid var(--line);
  display:grid;
  grid-template-columns:68px 240px;
  background:var(--panel);
  flex-shrink:0;
}

.nav-rail{
  border-right:1px solid var(--line);
  background:#f8f4ec;
  padding:14px 8px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.nav-item{
  border:none;
  background:transparent;
  color:var(--muted);
  text-align:left;
  border-radius:12px;
  padding:8px 10px;
  line-height:1.15;
  cursor:pointer;
}
.nav-item b{
  display:block;
  font-size:12px;
  font-weight:700;
}
.nav-item span{
  display:block;
  margin-top:4px;
  font-size:11px;
}
.nav-item.active{
  background:var(--accent-soft);
  color:var(--accent-deep);
}

.detail-panel{
  padding:18px 12px 18px 12px;
  overflow:auto;
}

.panel-section{
  display:none;
}
.panel-section.active{
  display:block;
}

.panel-title{
  font-size:13px;
  color:var(--accent-deep);
  letter-spacing:.08em;
  font-weight:800;
  margin-bottom:14px;
}

.info{
  font-size:12px;
  color:var(--muted);
  line-height:1.6;
}

.stack{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.field-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.control-stack{
  display:flex;
  flex-direction:column;
  gap:6px;
}

label{
  font-size:12px;
  color:#6f6b62;
  font-weight:700;
}

input[type="text"],
input[type="number"],
select{
  width:100%;
  height:40px;
  padding:8px 12px;
  border:1px solid var(--line);
  border-radius:14px;
  background:#fff;
  color:var(--text);
  outline:none;
}
input[type="text"]:focus,
input[type="number"]:focus,
select:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(119,161,66,.12);
}

input[type="range"]{
  appearance:none;
  -webkit-appearance:none;
  width:100%;
  height:6px;
  border-radius:999px;
  background:linear-gradient(90deg,var(--accent) 0%,var(--accent) var(--value,0%), #d8d8d8 var(--value,0%), #d8d8d8 100%);
}
input[type="range"]::-webkit-slider-thumb{
  appearance:none;
  -webkit-appearance:none;
  width:18px;
  height:18px;
  border-radius:50%;
  background:var(--accent);
  border:2px solid #fff;
  box-shadow:0 2px 7px rgba(0,0,0,.14);
  cursor:pointer;
}
input[type="range"]::-moz-range-thumb{
  width:18px;
  height:18px;
  border:none;
  border-radius:50%;
  background:var(--accent);
  cursor:pointer;
}

.range-shell{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  align-items:center;
  gap:10px;
  border:1px solid var(--line);
  border-radius:999px;
  padding:8px 12px;
  background:#fff;
}

.range-value{
  min-width:28px;
  text-align:right;
  font-size:12px;
  font-weight:800;
}

.row{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}

input[type="color"]{
  width:40px;
  height:40px;
  border:1px solid var(--line);
  border-radius:50%;
  background:#fff;
  padding:3px;
  cursor:pointer;
}

input[type="checkbox"]{
  width:15px;
  height:15px;
  accent-color:var(--accent);
}

.line-preview{
  width:40px;
  height:40px;
  border:1px solid var(--line);
  border-radius:50%;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.line-preview-bar{
  width:20px;
  height:2px;
  border-radius:999px;
  background:#222;
}

.swatch-row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.swatch{
  width:28px;
  height:28px;
  border-radius:50%;
  border:2px solid #fff;
  box-shadow:0 0 0 1px var(--line-strong);
  cursor:pointer;
}
.swatch.selected{
  box-shadow:0 0 0 2px var(--accent);
}

.filter-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.filter-btn{
  border:1px solid var(--line);
  background:#fff;
  border-radius:12px;
  padding:10px;
  cursor:pointer;
}
.filter-btn.active{
  border-color:var(--accent);
  background:var(--accent-soft);
  color:var(--accent-deep);
}

.hint-card{
  border:1px dashed var(--line-strong);
  border-radius:16px;
  padding:16px;
  background:#fff;
}

#fileInput{display:none;}

.display-shell{
  flex:1;
  min-width:0;
  display:flex;
  flex-direction:column;
  background:var(--canvas-bg);
}

.display-toolbar{
  height:58px;
  border-bottom:1px solid var(--line);
  background:rgba(255,253,248,0.86);
  padding:0 18px;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:10px;
  flex-shrink:0;
}

.display-toolbar .left-meta{
  margin-right:auto;
  color:var(--muted);
  font-size:12px;
}

.canvas-stage{
  flex:1;
  min-height:0;
  position:relative;
  overflow:hidden;
  background:var(--canvas-bg);
}

.empty-state{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

.empty-state-card{
  border:2px dashed rgba(120,110,92,.35);
  color:#9f9583;
  border-radius:20px;
  padding:32px 48px;
  background:rgba(255,253,248,.35);
  font-size:18px;
  cursor:pointer;
}
.empty-state-card:hover{
  border-color:rgba(119,161,66,.55);
  color:#7d775f;
}

.canvas-viewport{
  position:absolute;
  inset:0;
  overflow:hidden;
  cursor:grab;
}
.canvas-viewport.dragging{
  cursor:grabbing;
}

.canvas-wrapper{
  position:absolute;
  top:0;
  left:0;
  transform-origin:top left;
  will-change:transform;
}

#mainCanvas{
  display:block;
  background:transparent;
  cursor:crosshair;
}

#overlayCanvas{
  position:absolute;
  top:0;
  left:0;
  pointer-events:none;
}

.status-bar{
  height:36px;
  border-top:1px solid var(--line);
  background:rgba(255,253,248,0.88);
  padding:0 10px;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  font-size:11px;
  color:var(--muted);
}

.status-bar span{
  padding:4px 8px;
  border:1px solid var(--line);
  border-radius:999px;
  background:rgba(255,255,255,.7);
}

#gradmapPreview{
  height:12px;
  border:1px solid var(--line);
  border-radius:999px;
}

::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#cfc5b5;border-radius:999px;}

@media (max-width: 980px){
  .workspace{
    flex-direction:column;
  }
  .control-shell{
    width:100%;
    min-width:0;
    grid-template-columns:68px 1fr;
    border-right:none;
    border-bottom:1px solid var(--line);
    height:320px;
  }
}
</style>
</head>
<body>
<div class="app-shell">
  <header class="topbar">
    <div class="brand">Crossword photo</div>
    <div class="topbar-actions">
      <button class="btn sm" id="headerUploadBtn">上传</button>
    </div>
  </header>

  <div class="workspace">
    <aside class="control-shell">
      <div class="nav-rail">
        <button class="nav-item active" data-panel="gridPanel"><b>网格</b><span>设置</span></button>
        <button class="nav-item" data-panel="fillPanel"><b>填充</b><span>颜色</span></button>
        <button class="nav-item" data-panel="textPanel"><b>文字</b><span>内容</span></button>
        <button class="nav-item" data-panel="swapPanel"><b>错位</b><span>交换</span></button>
        <button class="nav-item" data-panel="filterPanel"><b>滤镜</b><span>效果</span></button>
      </div>

      <div class="detail-panel">
        <section class="panel-section active" id="gridPanel">
          <div class="panel-title">网格设置</div>
          <div class="stack">
            <p class="info">上传任意比例图片后，系统会根据原图比例自动裁切并生成正方形小方格矩阵。拖动密度滑块可以控制分割疏密。</p>
            <div class="control-stack">
              <label for="gridDensity">分割密度</label>
              <div class="range-shell">
                <input type="range" id="gridDensity" min="4" max="18" value="8" step="1">
                <span class="range-value" id="gridDensityVal">8</span>
              </div>
            </div>
            <div class="control-stack">
              <label for="lineWidth">线条粗细</label>
              <div class="row">
                <div class="range-shell" style="flex:1;">
                  <input type="range" id="lineWidth" min="1" max="6" value="2" step="1">
                  <span class="range-value" id="lineWidthVal">2</span>
                </div>
                <div class="line-preview" aria-hidden="true">
                  <div class="line-preview-bar" id="lineWidthPreview"></div>
                </div>
              </div>
            </div>
            <div class="control-stack">
              <label for="lineColor">网格颜色</label>
              <input type="color" id="lineColor" value="#000000">
            </div>
          </div>
        </section>

        <section class="panel-section" id="fillPanel">
          <div class="panel-title">填充设置</div>
          <div class="stack">
            <p class="info">点击方格填色，再次点击取消。按住 Shift 可以多选后批量填充。</p>
            <div class="control-stack">
              <label for="fillColor">填充颜色</label>
              <input type="color" id="fillColor" value="#ffffff">
            </div>
            <div class="control-stack">
              <label for="fillOpacity">透明度</label>
              <div class="range-shell">
                <input type="range" id="fillOpacity" min="0.2" max="1" step="0.05" value="1">
                <span class="range-value" id="fillOpacityVal">100%</span>
              </div>
            </div>
            <div class="swatch-row" id="colorSwatches"></div>
            <button class="btn" id="clearFillBtn">清除所有填充</button>
          </div>
        </section>

        <section class="panel-section" id="textPanel">
          <div class="panel-title">文字设置</div>
          <div class="stack">
            <p class="info">点击已填色方格输入文字。</p>
            <div class="control-stack">
              <label for="cellTextInput">字符输入</label>
              <input type="text" id="cellTextInput" placeholder="选中方格后在此输入" maxlength="4">
            </div>
            <div class="field-grid">
              <div class="control-stack">
                <label for="fontFamily">字体</label>
                <select id="fontFamily">
                  <option value="'Noto Sans SC',sans-serif">黑体</option>
                  <option value="'Space Mono',monospace">等宽体</option>
                  <option value="'Bebas Neue',sans-serif">Bebas</option>
                  <option value="'Caveat',cursive">英文手写体</option>
                  <option value="serif">衬线体</option>
                </select>
              </div>
              <div class="control-stack">
                <label for="fontSize">字号</label>
                <input type="number" id="fontSize" value="22" min="8" max="60">
              </div>
            </div>
            <div class="row">
              <div class="control-stack">
                <label for="fontColor">字色</label>
                <input type="color" id="fontColor" value="#000000">
              </div>
              <label style="display:flex;align-items:center;gap:8px;margin-top:20px;">
                <input type="checkbox" id="fontItalic"> 斜体
              </label>
            </div>
            <div id="selectedCellHint" class="info">— 未选中方格 —</div>
          </div>
        </section>

        <section class="panel-section" id="swapPanel">
          <div class="panel-title">方格错位</div>
          <div class="stack">
            <p class="info">点击两个未被填充颜色的方格可交换图像内容。</p>
          </div>
        </section>

        <section class="panel-section" id="filterPanel">
          <div class="panel-title">滤镜设置</div>
          <div class="stack">
            <p class="info">滤镜只影响图片图像，不影响网格、填充与文字。</p>
            <div class="filter-grid">
              <button class="filter-btn active" data-filter="none">原图</button>
              <button class="filter-btn" data-filter="bw">黑白复古</button>
              <button class="filter-btn" data-filter="film">做旧胶片</button>
              <button class="filter-btn" data-filter="gradmap">渐变映射</button>
            </div>
            <div id="gradmapExtra" style="display:none;">
              <div id="gradmapPreview" style="margin:4px 0 8px;"></div>
              <button class="btn" id="rollGradmap">随机渐变映射</button>
            </div>
          </div>
        </section>
      </div>
    </aside>

    <section class="display-shell">
      <div class="display-toolbar">
        <div class="left-meta" id="viewMeta">滚轮缩放，拖拽移动，Shift 多选方格</div>
        <button class="btn sm" id="undoBtn">撤销</button>
        <button class="btn sm" id="redoBtn">重做</button>
        <button class="btn sm" id="resetBtn">全部重置</button>
        <button class="btn sm solid" id="exportPNG">导出 PNG</button>
        <button class="btn sm" id="exportJPG">导出 JPG</button>
      </div>

      <div class="canvas-stage" id="canvasStage">
        <div class="empty-state" id="noImageMsg">
          <button class="empty-state-card" id="emptyUploadBtn" type="button">请上传图片</button>
        </div>
        <div class="canvas-viewport" id="canvasViewport">
          <div class="canvas-wrapper" id="canvasWrapper" style="display:none;">
            <canvas id="mainCanvas"></canvas>
            <canvas id="overlayCanvas"></canvas>
          </div>
        </div>
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
      </div>

      <div class="status-bar">
        <span id="sGrid">网格: —</span>
        <span id="sCells">已填充: 0</span>
        <span id="sMode">模式: 填充</span>
        <span id="sCell">方格: —</span>
      </div>
    </section>
  </div>
</div>
 
<script>
const canvas  = document.getElementById('mainCanvas');
const overlay = document.getElementById('overlayCanvas');
const ctx  = canvas.getContext('2d');
const octx = overlay.getContext('2d');
const canvasStage = document.getElementById('canvasStage');
const canvasViewport = document.getElementById('canvasViewport');
const canvasWrapperEl = document.getElementById('canvasWrapper');
const fileInput = document.getElementById('fileInput');
const headerUploadBtn = document.getElementById('headerUploadBtn');
const emptyUploadBtn = document.getElementById('emptyUploadBtn');
 
let originalImage     = null;
let filteredCanvas    = null;
let currentFilter     = 'none';
let gradmapColors     = null;
 
let cols = 8, rows = 8;
let imgW = 0, imgH = 0;
let density = 8;
let gridLines = 2, lineColor = '#000000';
let fillColor = '#ffffff', fillOpacity = 1;
let cropX = 0, cropY = 0, cropW = 0, cropH = 0;
 
let cellFills = {}, cellText = {}, swapMap = {};
let currentMode    = 'fill';
let swapFirst      = null;
let selectedCells  = new Set();
let activeTextCell = null;
let history = [], historyIndex = -1;
let fontFamily = "'Noto Sans SC',sans-serif";
let fontSize = 22, fontColor = '#000000';
let fontItalic = false;
let viewScale = 1, fitScale = 1, panX = 0, panY = 0;
let isDraggingView = false, dragMoved = false, suppressCanvasClick = false;
let dragStartX = 0, dragStartY = 0, dragOriginX = 0, dragOriginY = 0;

function cellW(){ return Math.floor(imgW / cols); }
function cellH(){ return Math.floor(imgH / rows); }
 
const SWATCHES = [
  '#FF3B30','#FF9500','#FFCC00','#34C759',
  '#00B4FF','#007AFF','#5856D6','#AF52DE',
  '#FF2D55','#A2845E','#636366','#1C1C1E'
];
function initSwatches(){
  const cont = document.getElementById('colorSwatches');
  SWATCHES.forEach(c => {
    const s = document.createElement('div');
    s.className = 'swatch'; s.style.background = c; s.dataset.color = c;
    s.addEventListener('click', () => {
      document.querySelectorAll('.swatch').forEach(x => x.classList.remove('selected'));
      s.classList.add('selected');
      document.getElementById('fillColor').value = c;
      fillColor = c;
    });
    cont.appendChild(s);
  });
  cont.children[0].classList.add('selected');
}
 
const GM_PRESETS = [
  [
    { t: 0, color: '#2fa7e8' },
    { t: 0.38, color: '#ff4db8' },
    { t: 0.72, color: '#ff8a00' },
    { t: 1, color: '#ffe14a' }
  ],
  [
    { t: 0, color: '#0f3b8c' },
    { t: 0.32, color: '#8a39ff' },
    { t: 0.68, color: '#ff4f7a' },
    { t: 1, color: '#ffd84d' }
  ],
  [
    { t: 0, color: '#173b78' },
    { t: 0.28, color: '#00a6ff' },
    { t: 0.58, color: '#ff5fa2' },
    { t: 1, color: '#ffe65c' }
  ],
  [
    { t: 0, color: '#06246b' },
    { t: 0.34, color: '#00d2ff' },
    { t: 0.64, color: '#ff7a00' },
    { t: 1, color: '#fff07b' }
  ]
];
function randomGradmap(){ return GM_PRESETS[Math.floor(Math.random()*GM_PRESETS.length)].map(stop => ({ ...stop })); }
function hexToRgb(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
function updateGradmapPreview(){
  if(!gradmapColors) return;
  document.getElementById('gradmapPreview').style.background =
    `linear-gradient(to right, ${gradmapColors.map(stop => `${stop.color} ${Math.round(stop.t * 100)}%`).join(', ')})`;
}

function sampleGradmap(stops, t){
  if(t <= stops[0].t) return hexToRgb(stops[0].color);
  if(t >= stops[stops.length - 1].t) return hexToRgb(stops[stops.length - 1].color);
  for(let i=0;i<stops.length-1;i++){
    const a = stops[i];
    const b = stops[i+1];
    if(t >= a.t && t <= b.t){
      const localT = (t - a.t) / (b.t - a.t || 1);
      const [r1,g1,b1] = hexToRgb(a.color);
      const [r2,g2,b2] = hexToRgb(b.color);
      return [
        Math.round(r1 + (r2-r1) * localT),
        Math.round(g1 + (g2-g1) * localT),
        Math.round(b1 + (b2-b1) * localT)
      ];
    }
  }
  return hexToRgb(stops[stops.length - 1].color);
}

function clamp(v, min, max){
  return Math.max(min, Math.min(max, v));
}

function setRangeProgress(el){
  const min = parseFloat(el.min || 0);
  const max = parseFloat(el.max || 100);
  const val = parseFloat(el.value || min);
  const percent = ((val - min) / (max - min)) * 100;
  el.style.setProperty('--value', `${percent}%`);
}

function updateLineWidthUI(value){
  document.getElementById('lineWidthVal').textContent = `${Math.round(value)}`;
  document.getElementById('lineWidthPreview').style.height = `${Math.max(2, value * 1.5)}px`;
  setRangeProgress(document.getElementById('lineWidth'));
}

function updateDensityUI(value){
  document.getElementById('gridDensityVal').textContent = `${Math.round(value)}`;
  setRangeProgress(document.getElementById('gridDensity'));
}

function updateFillOpacityUI(value){
  document.getElementById('fillOpacityVal').textContent = `${Math.round(value * 100)}%`;
  setRangeProgress(document.getElementById('fillOpacity'));
}
 
function computeGridFromDensity(srcW, srcH, nextDensity){
  const ratio = srcW / srcH;
  let nextCols, nextRows;
  if(ratio >= 1){
    nextRows = nextDensity;
    nextCols = Math.max(1, Math.round(nextRows * ratio));
  } else {
    nextCols = nextDensity;
    nextRows = Math.max(1, Math.round(nextCols / ratio));
  }
  return { cols: nextCols, rows: nextRows };
}

function updateCropRegion(){
  if(!originalImage) return;
  const sourceW = originalImage.naturalWidth;
  const sourceH = originalImage.naturalHeight;
  const gridRatio = cols / rows;
  const sourceRatio = sourceW / sourceH;
  if(sourceRatio > gridRatio){
    cropH = sourceH;
    cropW = cropH * gridRatio;
    cropX = (sourceW - cropW) / 2;
    cropY = 0;
  } else {
    cropW = sourceW;
    cropH = cropW / gridRatio;
    cropX = 0;
    cropY = (sourceH - cropH) / 2;
  }
}

function applyFilter(filter){
  if(!originalImage) return;
  const tmp = document.createElement('canvas');
  tmp.width = imgW; tmp.height = imgH;
  const tc = tmp.getContext('2d');
  tc.drawImage(originalImage, cropX, cropY, cropW, cropH, 0, 0, imgW, imgH);
  if(filter === 'none'){ filteredCanvas = tmp; return; }
  const d = tc.getImageData(0,0,imgW,imgH), px = d.data;
 
  if(filter === 'bw'){
    for(let i=0;i<px.length;i+=4){
      const g = 0.2126*px[i]+0.7152*px[i+1]+0.0722*px[i+2];
      const v = Math.max(0,Math.min(255,((g-128)*1.35)+128));
      px[i]=px[i+1]=px[i+2]=v;
    }
  } else if(filter === 'film'){
    for(let i=0;i<px.length;i+=4){
      px[i]  =Math.min(255,px[i]*0.88+12);
      px[i+1]=Math.min(255,px[i+1]*0.84+6);
      px[i+2]=Math.min(255,px[i+2]*0.74);
      const n=(Math.random()-0.5)*24;
      px[i]  =Math.max(0,Math.min(255,px[i]+n));
      px[i+1]=Math.max(0,Math.min(255,px[i+1]+n));
      px[i+2]=Math.max(0,Math.min(255,px[i+2]+n));
    }
    const cx=imgW/2,cy=imgH/2,md=Math.sqrt(cx*cx+cy*cy);
    for(let y=0;y<imgH;y++) for(let x=0;x<imgW;x++){
      const idx=(y*imgW+x)*4;
      const f=1-0.48*Math.pow(Math.sqrt((x-cx)**2+(y-cy)**2)/md,1.6);
      px[idx]*=f; px[idx+1]*=f; px[idx+2]*=f;
    }
  } else if(filter === 'gradmap'){
    if(!gradmapColors) gradmapColors = randomGradmap();
    for(let i=0;i<px.length;i+=4){
      const lum = (0.2126*px[i]+0.7152*px[i+1]+0.0722*px[i+2])/255;
      const boosted = Math.pow(Math.min(1, Math.max(0, lum)), 0.8);
      const [r,g,b] = sampleGradmap(gradmapColors, boosted);
      px[i] = r;
      px[i+1] = g;
      px[i+2] = b;
    }
  }
  tc.putImageData(d,0,0);
  filteredCanvas = tmp;
}
 
function render(){
  if(!originalImage) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const cw = cellW(), ch = cellH();
 
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const src = swapMap[`${r},${c}`]||`${r},${c}`;
    const [sr,sc] = src.split(',').map(Number);
    ctx.drawImage(filteredCanvas, sc*cw, sr*ch, cw, ch, c*cw, r*ch, cw, ch);
  }
 
  for(const [key,fill] of Object.entries(cellFills)){
    const [r,c]=key.split(',').map(Number);
    ctx.save(); ctx.globalAlpha=fill.opacity; ctx.fillStyle=fill.color;
    ctx.fillRect(c*cw, r*ch, cw, ch); ctx.restore();
  }
 
  ctx.save();
  ctx.beginPath();
  ctx.rect(0,0,canvas.width,canvas.height);
  ctx.clip();
  ctx.strokeStyle = lineColor;
  ctx.lineWidth = gridLines;
  ctx.lineCap = 'butt';
  const inset = gridLines / 2;
  for(let c=0;c<=cols;c++){
    const x = Math.min(canvas.width - inset, Math.max(inset, c*cw));
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }
  for(let r=0;r<=rows;r++){
    const y = Math.min(canvas.height - inset, Math.max(inset, r*ch));
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }
  ctx.restore();
 
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const italicStyle = fontItalic ? 'italic ' : '';
  ctx.font = `${italicStyle}${fontSize}px ${fontFamily}`;
  
  for(const [key,txt] of Object.entries(cellText)){
    if(!txt) continue;
    const [r,c]=key.split(',').map(Number);
    const x=c*cw+cw/2, y=r*ch+ch/2;
    ctx.fillStyle=fontColor; ctx.fillText(txt,x,y);
  }
  renderOverlay(); updateStatus();
}
 
function renderOverlay(){
  octx.clearRect(0,0,overlay.width,overlay.height);
  const cw=cellW(), ch=cellH();
  selectedCells.forEach(key=>{
    const [r,c]=key.split(',').map(Number);
    octx.fillStyle='rgba(255,255,255,0.15)'; octx.strokeStyle='rgba(255,255,255,0.7)';
    octx.lineWidth=1.5; octx.fillRect(c*cw,r*ch,cw,ch); octx.strokeRect(c*cw+1,r*ch+1,cw-2,ch-2);
  });
  if(activeTextCell){
    const [r,c]=activeTextCell.split(',').map(Number);
    octx.fillStyle='rgba(255,255,255,0.12)'; octx.strokeStyle='rgba(255,255,255,0.9)';
    octx.lineWidth=1.5; octx.fillRect(c*cw,r*ch,cw,ch); octx.strokeRect(c*cw+1,r*ch+1,cw-2,ch-2);
  }
  if(swapFirst){
    const [r,c]=swapFirst.split(',').map(Number);
    octx.fillStyle='rgba(255,255,255,0.08)'; octx.strokeStyle='rgba(255,255,255,0.5)';
    octx.setLineDash([4,3]); octx.lineWidth=1.5;
    octx.fillRect(c*cw,r*ch,cw,ch); octx.strokeRect(c*cw+1,r*ch+1,cw-2,ch-2); octx.setLineDash([]);
  }
}
 
function snap(){ return { f:JSON.parse(JSON.stringify(cellFills)), t:JSON.parse(JSON.stringify(cellText)), s:JSON.parse(JSON.stringify(swapMap)) }; }
function saveHistory(){ history=history.slice(0,historyIndex+1); history.push(snap()); if(history.length>60) history.shift(); historyIndex=history.length-1; }
function undo(){ if(historyIndex>0){ historyIndex--; restore(history[historyIndex]); } }
function redo(){ if(historyIndex<history.length-1){ historyIndex++; restore(history[historyIndex]); } }
function restore(s){ cellFills=JSON.parse(JSON.stringify(s.f)); cellText=JSON.parse(JSON.stringify(s.t)); swapMap=JSON.parse(JSON.stringify(s.s)); render(); }
 
function pickCell(e){
  const rect=canvas.getBoundingClientRect();
  const x=(e.clientX-rect.left)*(canvas.width/rect.width);
  const y=(e.clientY-rect.top)*(canvas.height/rect.height);
  const cw=cellW(), ch=cellH();
  const c=Math.floor(x/cw), r=Math.floor(y/ch);
  return (r>=0&&r<rows&&c>=0&&c<cols)?`${r},${c}`:null;
}
 
canvas.addEventListener('click', e=>{
  if(!originalImage) return;
  if(suppressCanvasClick){
    suppressCanvasClick = false;
    return;
  }
  const key=pickCell(e); if(!key) return;
 
  if(currentMode==='fill'){
    if(e.shiftKey){
      if(selectedCells.has(key)) selectedCells.delete(key); else selectedCells.add(key); renderOverlay();
    } else {
      saveHistory();
      if(selectedCells.size>0){ selectedCells.add(key); selectedCells.forEach(k=>{ if(cellFills[k]) delete cellFills[k]; else cellFills[k]={color:fillColor,opacity:fillOpacity}; }); selectedCells.clear(); }
      else { if(cellFills[key]) delete cellFills[key]; else cellFills[key]={color:fillColor,opacity:fillOpacity}; }
      render();
    }
  } else if(currentMode==='text'){
    if(!cellFills[key]){ document.getElementById('selectedCellHint').textContent='— 请点击已填色方格 —'; activeTextCell=null; renderOverlay(); return; }
    activeTextCell=key; const [r,c]=key.split(',').map(Number);
    document.getElementById('selectedCellHint').textContent=`已选中：行 ${r+1}  列 ${c+1}`;
    document.getElementById('sCell').textContent=`方格: [${r+1},${c+1}]`;
    const inp=document.getElementById('cellTextInput'); inp.value=cellText[key]||''; inp.focus(); inp.select(); renderOverlay();
  } else if(currentMode==='swap'){
    if(cellFills[key]) return;
    if(!swapFirst){ swapFirst=key; renderOverlay(); }
    else if(swapFirst===key){ swapFirst=null; renderOverlay(); }
    else { saveHistory(); const a=swapMap[swapFirst]||swapFirst, b=swapMap[key]||key; swapMap[swapFirst]=b; swapMap[key]=a; swapFirst=null; render(); }
  }
});
 
document.getElementById('cellTextInput').addEventListener('input', e=>{
  if(!activeTextCell) return; saveHistory();
  const v=e.target.value; if(v) cellText[activeTextCell]=v; else delete cellText[activeTextCell]; render();
});
 
function updateViewportTransform(){
  canvasWrapperEl.style.transform = `translate(${panX}px, ${panY}px) scale(${viewScale})`;
}

function fitCanvasToStage(){
  if(!originalImage || !canvas.width || !canvas.height) return;
  const stageW = canvasStage.clientWidth;
  const stageH = canvasStage.clientHeight;
  fitScale = Math.min(
    Math.max(0.08, (stageW - 56) / canvas.width),
    Math.max(0.08, (stageH - 56) / canvas.height),
    1
  );
  viewScale = fitScale;
  panX = Math.round((stageW - canvas.width * viewScale) / 2);
  panY = Math.round((stageH - canvas.height * viewScale) / 2);
  updateViewportTransform();
}

function setupCanvas(){
  const MAX_DIM = 1800;
  updateCropRegion();
  const downScale = Math.min(1, MAX_DIM / Math.max(cropW, cropH));
  const targetW = cropW * downScale;
  const targetH = cropH * downScale;
  const cellSize = Math.max(8, Math.floor(Math.min(targetW / cols, targetH / rows)));
  imgW = cellSize * cols;
  imgH = cellSize * rows;
  canvas.width = imgW;
  canvas.height = imgH;
  overlay.width = imgW;
  overlay.height = imgH;
  canvasWrapperEl.style.width = `${imgW}px`;
  canvasWrapperEl.style.height = `${imgH}px`;
  fitCanvasToStage();
}
 
function loadImage(file){
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      originalImage=img;
      const auto = computeGridFromDensity(img.naturalWidth, img.naturalHeight, density);
      cols = auto.cols;
      rows = auto.rows;
      setupCanvas();

      applyFilter(currentFilter);
      cellFills={}; cellText={}; swapMap={}; activeTextCell=null; swapFirst=null; selectedCells.clear();
      history=[]; historyIndex=-1; saveHistory();
      document.getElementById('noImageMsg').style.display='none';
      canvasWrapperEl.style.display='block';
      fitCanvasToStage();
      render();
      fileInput.value = '';
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}
 
fileInput.addEventListener('change', e=>{ if(e.target.files[0]) loadImage(e.target.files[0]); });
headerUploadBtn.addEventListener('click', ()=>fileInput.click());
emptyUploadBtn.addEventListener('click', ()=>fileInput.click());
 
function gridUpdate(){
  density=Math.max(4,parseInt(document.getElementById('gridDensity').value)||8);
  gridLines=parseFloat(document.getElementById('lineWidth').value);
  lineColor=document.getElementById('lineColor').value;
  updateDensityUI(density);
  updateLineWidthUI(gridLines);
  if(!originalImage) return;
  const auto = computeGridFromDensity(originalImage.naturalWidth, originalImage.naturalHeight, density);
  cols = auto.cols;
  rows = auto.rows;
  setupCanvas();
  applyFilter(currentFilter);
  saveHistory(); render();
}
document.getElementById('gridDensity').addEventListener('input',gridUpdate);
document.getElementById('lineWidth').addEventListener('input', e=>{
  gridLines=parseFloat(e.target.value);
  updateLineWidthUI(gridLines);
  if(originalImage) render();
});
document.getElementById('lineColor').addEventListener('input', e=>{ lineColor=e.target.value; if(originalImage) render(); });
 
document.getElementById('fillColor').addEventListener('input', e=>{
  fillColor=e.target.value; document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('selected'));
});
document.getElementById('fillOpacity').addEventListener('input', e=>{
  fillOpacity=parseFloat(e.target.value);
  updateFillOpacityUI(fillOpacity);
});
document.getElementById('clearFillBtn').addEventListener('click', ()=>{
  if(!originalImage) return; saveHistory(); cellFills={}; render();
});
 
document.getElementById('fontSize').addEventListener('input', e=>{ fontSize=parseInt(e.target.value)||22; if(originalImage) render(); });
document.getElementById('fontColor').addEventListener('input', e=>{ fontColor=e.target.value; if(originalImage) render(); });
document.getElementById('fontFamily').addEventListener('change', e=>{ fontFamily=e.target.value; if(originalImage) render(); });

// 斜体开关
document.getElementById('fontItalic').addEventListener('change', e=>{
  fontItalic = e.target.checked;
  if(originalImage) render();
});
 
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); currentFilter=btn.dataset.filter;
    const extra=document.getElementById('gradmapExtra');
    if(currentFilter==='gradmap'){ if(!gradmapColors){ gradmapColors=randomGradmap(); updateGradmapPreview(); } extra.style.display='block'; }
    else extra.style.display='none';
    if(originalImage){ applyFilter(currentFilter); render(); }
  });
});
document.getElementById('rollGradmap').addEventListener('click', ()=>{
  gradmapColors=randomGradmap(); updateGradmapPreview(); if(originalImage){ applyFilter('gradmap'); render(); }
});

document.querySelectorAll('.nav-item').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.nav-item').forEach(item=>item.classList.remove('active'));
    document.querySelectorAll('.panel-section').forEach(panel=>panel.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.panel).classList.add('active');
    const modeMap = {
      gridPanel:'fill',
      fillPanel:'fill',
      textPanel:'text',
      swapPanel:'swap',
      filterPanel:'fill'
    };
    setMode(modeMap[btn.dataset.panel] || 'fill');
  });
});
 
function setMode(mode){
  currentMode=mode; swapFirst=null; activeTextCell=null; selectedCells.clear();
  const lbl={fill:'填充',text:'文字',swap:'错位'};
  document.getElementById('sMode').textContent='模式: '+lbl[mode];
  document.getElementById('selectedCellHint').textContent= mode==='text'?'— 点击已填色方格进行编辑 —':'— 未选中方格 —';
  renderOverlay();
}
 
document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('redoBtn').addEventListener('click', redo);
document.addEventListener('keydown', e=>{
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key==='z'){e.preventDefault();undo();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='z'))){e.preventDefault();redo();}
});
 
document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(!originalImage) return;
  cellFills={}; cellText={}; swapMap={}; currentFilter='none'; gradmapColors=null;
  activeTextCell=null; swapFirst=null; selectedCells.clear();
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-filter="none"]').classList.add('active');
  document.getElementById('gradmapExtra').style.display='none';
  applyFilter('none'); history=[]; historyIndex=-1; saveHistory(); render();
});
 
function exportImage(type){
  if(!canvas.width||!originalImage) return;
  const a=document.createElement('a');
  a.download=`photo-puzzle-${Date.now()}.${type}`;
  a.href=canvas.toDataURL(type==='jpg'?'image/jpeg':'image/png',0.95);
  a.click();
}
document.getElementById('exportPNG').addEventListener('click', ()=>exportImage('png'));
document.getElementById('exportJPG').addEventListener('click', ()=>exportImage('jpg'));

canvasViewport.addEventListener('wheel', e=>{
  if(!originalImage) return;
  e.preventDefault();
  const rect = canvasStage.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;
  const contentX = (mouseX - panX) / viewScale;
  const contentY = (mouseY - panY) / viewScale;
  const nextScale = clamp(viewScale * (e.deltaY < 0 ? 1.12 : 0.9), fitScale * 0.35, fitScale * 8);
  panX = mouseX - contentX * nextScale;
  panY = mouseY - contentY * nextScale;
  viewScale = nextScale;
  updateViewportTransform();
}, { passive:false });

canvasViewport.addEventListener('mousedown', e=>{
  if(!originalImage || e.button !== 0 || e.shiftKey) return;
  isDraggingView = true;
  dragMoved = false;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragOriginX = panX;
  dragOriginY = panY;
  canvasViewport.classList.add('dragging');
});

window.addEventListener('mousemove', e=>{
  if(!isDraggingView) return;
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  if(Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;
  panX = dragOriginX + dx;
  panY = dragOriginY + dy;
  updateViewportTransform();
});

window.addEventListener('mouseup', ()=>{
  if(!isDraggingView) return;
  isDraggingView = false;
  canvasViewport.classList.remove('dragging');
  if(dragMoved) suppressCanvasClick = true;
});

window.addEventListener('resize', ()=>{
  if(!originalImage) return;
  fitCanvasToStage();
});
 
function updateStatus(){
  const cw=cellW(),ch=cellH();
  document.getElementById('sGrid').textContent=`网格: ${cols}×${rows}  密度: ${density}  格: ${cw}×${ch}px`;
  document.getElementById('sCells').textContent=`已填充: ${Object.keys(cellFills).length}`;
}
 
initSwatches();
updateDensityUI(density);
updateLineWidthUI(gridLines);
updateFillOpacityUI(fillOpacity);
setMode('fill');
updateStatus();
</script>
</body>
